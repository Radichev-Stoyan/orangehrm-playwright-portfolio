services:
  db:
    image: mariadb:10.11
    container_name: orangehrm-db
    environment:
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - orangehrm_db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 10

  orangehrm:
    image: orangehrm/orangehrm:latest
    container_name: orangehrm-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      ORANGEHRM_DATABASE_HOST: db
      ORANGEHRM_DATABASE_PORT: 3306
      ORANGEHRM_DATABASE_NAME: orangehrm
      ORANGEHRM_DATABASE_USER: orangehrm
      ORANGEHRM_DATABASE_PASSWORD: orangehrm
    volumes:
      - orangehrm_app_data:/orangehrm

volumes:
  orangehrm_db_data:
  orangehrm_app_data:
